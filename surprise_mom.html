<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>For you &lt;3</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #ece9e3;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    color: #2a2a2a;
  }

  /* ─── SCREENS ─── */
  .screen { display:none; min-height:100vh; width:100%; }
  .screen.active { display:flex; flex-direction:column; }

  /* ─── SCREEN 2: STREET SCENE ─── */
  #screen-street {
    background: #ece9e3;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 60px 20px 40px;
  }
  .street-scene {
    display:flex;
    align-items: flex-end;
    justify-content: center;
    gap: 40px;
    width: 100%;
    max-width: 380px;
    margin-bottom: 32px;
  }

  /* BIKE SVG */
  .bike-wrap {
    flex-shrink:0;
    animation: bike-rock 3s ease-in-out infinite;
    transition: none;
    position: relative;
    z-index: 2;
  }
  @keyframes bike-rock {
    0%,100% { transform: rotate(-1deg); }
    50% { transform: rotate(1deg); }
  }
  .bike-wrap.riding {
    animation: bike-ride 1s ease-in forwards;
  }
  @keyframes bike-ride {
    0%   { transform: translateX(0) rotate(0deg); }
    60%  { transform: translateX(120px) rotate(1deg); }
    80%  { transform: translateX(145px) rotate(-1deg); }
    100% { transform: translateX(160px) rotate(0deg); opacity: 0; }
  }

  /* SHOP */
  .shop-wrap {
    cursor: pointer;
    flex-shrink:0;
    transition: transform 0.15s;
    position:relative;
  }
  .shop-wrap:hover { transform: scale(1.05); }
  .shop-wrap:active { transform: scale(0.97); }
  .shop-pulse {
    position:absolute;
    top:-8px; left:50%;
    transform: translateX(-50%);
    width: 12px; height:12px;
    background: #c9a96e;
    border-radius:50%;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: translateX(-50%) scale(1); opacity:1; }
    50% { transform: translateX(-50%) scale(1.8); opacity:0.3; }
  }

  .tap-hint {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: #5a5040;
    text-align: center;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 10px;
    animation: hint-fade 2s ease-in-out infinite;
  }
  @keyframes hint-fade {
    0%,100% { opacity:1; }
    50% { opacity:0.5; }
  }
  .sparkle { color: #c9a96e; font-size:18px; }

  /* ─── SCREEN 3: SHOP INTERIOR ─── */
  #screen-shop {
    background: #ece9e3;
    padding: 0;
  }
  .shop-header {
    padding: 18px 20px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
  }
  .back-arrow { font-size:14px; color:#666; font-family:'Caveat',cursive; }

  .counter-area {
    padding: 0 20px 0;
    display:flex;
    flex-direction:column;
    align-items:center;
    flex:1;
  }

  /* CASH REGISTER + COUNTER */
  .counter-scene {
    width: 100%;
    max-width: 360px;
    margin: 0 auto 24px;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* DIALOGUE BUBBLE */
  .dialogue-bubble {
    background: white;
    border-radius: 18px;
    padding: 10px 18px;
    font-family: 'Caveat', cursive;
    font-size: 19px;
    color: #2a2a2a;
    box-shadow: 0 3px 14px rgba(0,0,0,0.10);
    position: relative;
    margin-bottom: 10px;
    cursor:pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
    animation: bubble-bounce 2s ease-in-out infinite;
  }
  .dialogue-bubble:hover { transform: scale(1.04); box-shadow: 0 5px 20px rgba(0,0,0,0.14); }
  .dialogue-bubble:active { transform: scale(0.97); }
  @keyframes bubble-bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .dialogue-bubble::after {
    content:'';
    position:absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid white;
  }

  /* COUNTER SVG AREA */
  .counter-svg-wrap { width:100%; max-width:340px; }

  /* ─── SCREEN 4: NOTE CARD ─── */
  #screen-note {
    background: #ece9e3;
    align-items: center;
    justify-content: flex-start;
    padding-top: 0;
  }
  .note-header {
    padding: 18px 20px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    width:100%;
  }
  .note-card-wrap {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
    margin: 0 auto;
    animation: card-rise 0.5s ease-out;
  }
  @keyframes card-rise {
    from { opacity:0; transform: translateY(30px); }
    to { opacity:1; transform: translateY(0); }
  }
  .note-card {
    background: #f5f1eb;
    border-radius: 8px;
    padding: 36px 32px 28px;
    box-shadow: 0 6px 30px rgba(0,0,0,0.10);
    margin-bottom: 0;
  }
  .note-title {
    font-family: 'Caveat', cursive;
    font-size: 32px;
    font-weight: 700;
    color: #1a1a1a;
    text-align:center;
    margin-bottom: 24px;
  }
  .note-body {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: #2a2a2a;
    line-height: 1.8;
  }
  .note-body p { margin-bottom: 18px; }
  .note-sign {
    font-family: 'Caveat', cursive;
    font-size: 21px;
    font-weight: 600;
    color: #2a2a2a;
    text-align: right;
    margin-top: 8px;
  }
  .note-heart {
    font-size: 20px;
    color: #888;
    margin-top:14px;
  }

  /* BOUQUET at bottom */
  .bouquet-wrap {
    display:flex;
    justify-content:center;
    margin-top: -10px;
    animation: bouquet-in 0.6s 0.2s ease-out both;
  }
  @keyframes bouquet-in {
    from { opacity:0; transform: translateY(40px) scale(0.8); }
    to { opacity:1; transform: translateY(0) scale(1); }
  }

</style>
</head>
<body>

<script>
  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  function rideToShop() {
    const bike = document.querySelector('.bike-wrap');
    const hint = document.querySelector('.tap-hint');
    const shopWrap = document.querySelector('.shop-wrap');
    // Disable further clicks
    shopWrap.style.pointerEvents = 'none';
    // Hide hint
    hint.style.transition = 'opacity 0.3s';
    hint.style.opacity = '0';
    // Trigger ride animation
    bike.classList.remove('riding'); // reset if needed
    void bike.offsetWidth; // force reflow
    bike.classList.add('riding');
    // After animation, switch screen
    setTimeout(() => {
      goTo('screen-shop');
      // Reset bike for if user comes back
      bike.classList.remove('riding');
      hint.style.opacity = '1';
      shopWrap.style.pointerEvents = '';
    }, 1050);
  }
</script>
</body>
</html>
